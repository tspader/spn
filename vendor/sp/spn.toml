[package]
namespace = "spader"
name = "sp"
url = "https://github.com/tspader/sp.git"
version = "3.3.0"
commit = "cb474f197d44a332e3a7e6fd84dff06e276f7d4a"
author = "tspader"
maintainer = "tspader"
system_deps = [
  { lib = "m", when = { os = "linux" } },
]

[[lib]]
name = "sp"
kinds = ["source"]

[publish]
copy = [
  { from = "source/sp.h", to = "include" },
  { from = "source/sp/*", to = "include/sp" },
]
