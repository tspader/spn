[package]
namespace = "spader"
name = "wamr"
url = "https://github.com/bytecodealliance/wasm-micro-runtime.git"
version = "2.4.1"
commit = "0b9db98aea32f5d634de8268a57b442f41fffc45"
system_deps = [
  { lib = "m", when = { os = "linux" } },
  { lib = "ws2_32", when = { os = "windows" } },
  { lib = "ntdll", when = { os = "windows" } },
  { lib = "bcrypt", when = { os = "windows" } },
  { lib = "pathcch", when = { os = "windows" } },
]

# wasm_export.h declares the runtime API __declspec(dllimport) under MSVC
# unless this macro is empty; vmlib is static, so it must be
[options.static_api]
type = "bool"
public = true
define = "WASM_RUNTIME_API_EXTERN="
default = [
  { when = { abi = "msvc" }, value = true },
  { value = false },
]

[[lib]]
name = "vmlib"
kinds = ["static"]
define = [
  # wasm_c_api.h has its own import/export macro separate from
  # wasm_export.h's; nothing outside vmlib uses the C API, so it only
  # needs neutralizing here
  { value = "WASM_API_EXTERN=", when = { abi = "msvc" } },
  { value = "BH_PLATFORM_LINUX", when = { os = "linux" } },
  { value = "BH_PLATFORM_DARWIN", when = { os = "macos" } },
  { value = "BH_PLATFORM_WINDOWS", when = { os = "windows" } },
  { value = "HAVE_STRUCT_TIMESPEC", when = { os = "windows" } },
  { value = "_WINSOCK_DEPRECATED_NO_WARNINGS", when = { os = "windows" } },
  { value = "BUILD_TARGET_X86_64", when = { arch = "x86_64" } },
  { value = "BUILD_TARGET_AARCH64", when = { arch = "aarch64" } },
  "BH_MALLOC=wasm_runtime_malloc",
  "BH_FREE=wasm_runtime_free",
  "WASM_ENABLE_INTERP=1",
  "WASM_ENABLE_FAST_INTERP=1",
  "WASM_ENABLE_AOT=0",
  "WASM_ENABLE_JIT=0",
  "WASM_ENABLE_LIBC_BUILTIN=0",
  "WASM_ENABLE_LIBC_WASI=1",
  "WASM_ENABLE_MULTI_MODULE=0",
  "WASM_ENABLE_REF_TYPES=1",
  "WASM_ENABLE_MODULE_INST_CONTEXT=1",
  "WASM_ENABLE_BULK_MEMORY=1",
  "WASM_ENABLE_BULK_MEMORY_OPT=1",
  "WASM_ENABLE_CALL_INDIRECT_OVERLONG=1",
  # SEH-based bounds checks only compile under MSVC
  { value = "WASM_DISABLE_HW_BOUND_CHECK=0", when = { os = { not = "windows" } } },
  { value = "WASM_DISABLE_HW_BOUND_CHECK=1", when = { os = "windows" } },
  "_GNU_SOURCE",
]
include = [
  "core/iwasm/include",
  "core/iwasm/common",
  "core/iwasm/interpreter",
  # Each platform dir has its own platform_internal.h; exactly one may be
  # on the include path
  { path = "core/shared/platform/darwin", when = { os = { not = "windows" } } },
  { path = "core/shared/platform/windows", when = { os = "windows" } },
  "core/shared/platform/include",
  "core/shared/platform/common/libc-util",
  "core/shared/mem-alloc",
  "core/shared/utils",
  "core/iwasm/libraries/libc-wasi",
  "core/iwasm/libraries/libc-wasi/sandboxed-system-primitives/include",
  "core/iwasm/libraries/libc-wasi/sandboxed-system-primitives/src",
]
source = [
  "core/iwasm/common/*.c",
  { path = "core/iwasm/common/arch/invokeNative_em64.s", when = { arch = "x86_64", os = { not = "windows" } } },
  { path = "core/iwasm/common/arch/invokeNative_mingw_x64.s", when = { arch = "x86_64", os = "windows" } },
  { path = "core/iwasm/common/arch/invokeNative_aarch64.s", when = { arch = "aarch64" } },
  "core/iwasm/interpreter/wasm_runtime.c",
  "core/iwasm/interpreter/wasm_loader.c",
  "core/iwasm/interpreter/wasm_interp_fast.c",
  { path = "core/shared/platform/linux/*.c", when = { os = "linux" } },
  { path = "core/shared/platform/darwin/*.c", when = { os = "macos" } },
  # win_atomic.cpp is only needed with WASM_ENABLE_SHARED_MEMORY, so the *.c
  # glob skipping it is what we want
  { path = "core/shared/platform/windows/*.c", when = { os = "windows" } },
  { path = "core/shared/platform/common/posix/*.c", when = { os = { not = "windows" } } },
  "core/shared/platform/common/libc-util/*.c",
  "core/shared/platform/common/memory/*.c",
  "core/shared/mem-alloc/mem_alloc.c",
  "core/shared/mem-alloc/ems/*.c",
  "core/shared/mem-alloc/tlsf/*.c",
  "core/shared/utils/*.c",
  "core/iwasm/libraries/libc-wasi/libc_wasi_wrapper.c",
  "core/iwasm/libraries/libc-wasi/sandboxed-system-primitives/src/*.c",
]
flags = [
  { value = "-Wno-unused-function", when = { abi = { not = "msvc" } } },
  { value = "-Wno-unused-variable", when = { abi = { not = "msvc" } } },
  { value = "-Wno-unused-parameter", when = { abi = { not = "msvc" } } },
]

[publish]
copy = [
  { from = "source/core/iwasm/include/*.h", to = "include" },
]
