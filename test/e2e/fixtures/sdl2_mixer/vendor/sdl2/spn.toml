[package]
namespace = "libsdl"
name = "sdl2"
version = "2.30.4"
url = "https://github.com/libsdl-org/SDL.git"
commit = "92fe3b19c868ad062c323dde2cfc9d8b4bfdd785"
system_deps = [
  { lib = "m", when = { os = "linux" } },
  { lib = "dl", when = { os = "linux" } },
  { lib = "pthread", when = { os = "linux" } },
]

[[lib]]
name = "SDL2"
kinds = ["static"]

[publish]
copy = [
  { from = "store/include/SDL2/*", to = "include" },
]
