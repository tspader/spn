[package]
namespace = "libsdl"
name = "sdl2_mixer"
version = "2.8.0"
url = "https://github.com/libsdl-org/SDL_mixer.git"
commit = "a37e09f85d321a13dfcf0d4432827ee09beeb623"

[deps.package]
"libsdl/sdl2" = { path = "../sdl2" }

[[lib]]
name = "SDL2_mixer"
kinds = ["static"]

[publish]
copy = [
  { from = "store/include/SDL2/*", to = "include" },
]
