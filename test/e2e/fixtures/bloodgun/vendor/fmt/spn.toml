[package]
namespace = "fmtlib"
name = "fmt"
version = "10.2.1"
url = "https://github.com/fmtlib/fmt.git"
commit = "e69e5f977d458f2650bb346dadf2ad30c5320281"

[[lib]]
name = "fmt"
kinds = ["static"]
source = ["src/format.cc", "src/os.cc"]
include = ["include"]
cxx = { standard = "c++17" }

[publish]
copy = [
  { from = "source/include/*", to = "include" },
]
