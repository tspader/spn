[package]
namespace = "wolfpld"
name = "tracy"
version = "0.11.1"
url = "https://github.com/wolfpld/tracy.git"
commit = "5d542dc09f3d9378d005092a4ad446bd405f819a"
system_deps = [
  { lib = "pthread", when = { os = "linux" } },
  { lib = "dl", when = { os = "linux" } },
]

[options.enable]
type = "bool"
default = false
define = "TRACY_ENABLE"
public = true

[[lib]]
name = "tracy"
kinds = ["static"]
source = ["public/TracyClient.cpp"]
include = ["public"]
cxx = { standard = "c++11" }

[publish]
copy = [
  { from = "source/public/tracy", to = "include" },
  { from = "source/public/common", to = "include" },
  { from = "source/public/client", to = "include" },
]
