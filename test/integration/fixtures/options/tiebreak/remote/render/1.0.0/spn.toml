[package]
name = "render"
version = "1.0.0"

[options.backend]
type = "enum"
values = ["gl", "vk"]
default = "gl"

[[lib]]
name = "render"
kinds = ["static"]
source = [
  { path = "backend_gl.c", when = { backend = "gl" } },
  { path = "backend_vk.c", when = { backend = "vk" } },
]
headers = ["render.h"]
