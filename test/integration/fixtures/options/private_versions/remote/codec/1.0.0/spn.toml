[package]
name = "codec"
version = "1.0.0"

[options.mode]
type = "enum"
values = ["fast", "small"]
default = "fast"

[[lib]]
name = "codec"
kinds = ["static"]
source = [
  { path = "codec_fast.c", when = { mode = "fast" } },
  { path = "codec_small.c", when = { mode = "small" } },
]
headers = ["codec.h"]
