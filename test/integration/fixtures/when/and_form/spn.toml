[package]
name = "when_and_form"
version = "0.1.0"

[[bin]]
name = "main"
source = ["main.c"]
define = [
  { value = "RELEASE_OS", when = { os = "linux", mode = "release" } },
  { value = "RELEASE_OS", when = { os = "macos", mode = "release" } },
  { value = "RELEASE_OS", when = { os = "windows", mode = "release" } },
]
