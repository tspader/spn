[package]
namespace = "core"
name = "zig"
version = "1.0.0"

[[toolchain]]
name = "x86_64-linux"
url = "https://example.com/toolchain.tar.gz"
compiler = "cc"
linker = "ld"
archiver = "ar"
driver = "gcc"
export = true

[[toolchain.host]]
arch = "x86_64"
os = "linux"
abi = "gnu"

[[toolchain.host]]
arch = "x86_64"
os = "linux"
abi = "musl"

[[toolchain.target]]
arch = "aarch64"
os = "linux"
abi = "gnu"

[[toolchain.target]]
arch = "aarch64"
os = "macos"

[[toolchain.target]]
arch = "x86_64"
os = "windows"
abi = "mingw"
