[package]
name = "optioninvalid"
version = "1.0.0"

[options.tls]
type = "enum"
values = ["openssl", "off"]
default = [ { when = { os = "windows" } } ]

[options.zstd]
type = "bool"
default = 3

[options.raw]
type = "enum"
values = ["a"]
default = [ "a" ]

[options.pin]
type = "enum"
values = ["x"]
default = [ { value = "x", when = { os = 3 } } ]
