[package]
name = "p"
version = "1.0.0"

[[toolchain]]
name = "zig"
mirrors = "https://mirrors"
compiler = "zig cc -target x86_64-linux-gnu"
linker = "zig cc"
archiver = "ar"
driver = "clang"
target = [{ arch = "aarch64", os = "macos" }]

[toolchain.host.x86_64]
url = "https://tc"
sha256 = "deadbeef"

[toolchain.host.aarch64]
url = "https://tc"
sha256 = "deadbeef"
