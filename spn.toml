[package]
name = "spn"
version = "0.1.0"
repo = "tspader/spn"

[deps.package]
spcc = "1.0.0"
sp = "1.6.6"
toml = "1.2.1"

[deps.test]
utest = "1.0.0"

[[profile]]
name = "debug"
mode = "debug"
cc = "clang"

[[profile]]
name = "release"
mode = "release"
cc = "clang"

[[profile]]
name = "fast"
mode = "debug"
cc = "tcc"

[[profile]]
name = "static"
mode = "debug"
cc = "musl-gcc"
libc = "musl"
linkage = "static"

[[profile]]
name = "macos"
cc = "clang"
linkage = "shared"
libc = "gnu"
standard = "c99"
mode = "debug"

[[bin]]
name = "spn"
source = ["source/spn.c", "source/graph.c", "source/task.c", "source/tui.c", "source/ctx.c", "source/cli.c", "source/ordered_map.c", "source/spinner.c", "source/toml.c", "source/pty.c", "source/sp/str.c", "source/sp/color.c", "source/sp/os.c", "source/sp/ps.c", "source/sp/io.c"]
include = ["include"]

[[test]]
name = "cli"
source = ["test/core/cli.c", "test/tools/test.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "graph"
source = ["source/graph.c", "test/core/graph.c", "test/tools/test.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "om"
source = ["test/core/ordered_map.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "integration"
source = ["test/integration/main.c", "test/tools/test.c", "test/tools/harness.c", "test/tools/toml.c", "source/external/tom.c"]
include = ["include", "source", "test/tools", "test/integration"]
