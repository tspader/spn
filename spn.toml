[package]
name = "spn"
version = "0.1.0"
repo = "tspader/spn"

[deps.package]
spcc = "1.0.0"
sp = "1.6.6"
toml = "1.2.0"

[deps.test]
utest = "1.0.0"

[[profile]]
name = "debug"
mode = "debug"
cc = "clang"

[[profile]]
name = "release"
mode = "release"
cc = "clang"

[[profile]]
name = "fast"
mode = "debug"
cc = "tcc"

[[profile]]
name = "static"
mode = "debug"
cc = "musl-gcc"
libc = "musl"
linkage = "static"

[[profile]]
name = "macos"
cc = "clang"
linkage = "shared"
libc = "gnu"
standard = "c99"
mode = "debug"

[[bin]]
name = "spn"
source = ["source/spn.c"]
include = ["include"]

[[test]]
name = "cli"
source = ["test/core/cli.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "graph"
source = ["test/core/graph.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "om"
source = ["test/core/ordered_map.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "integration"
source = ["test/integration/main.c"]
include = ["include", "source", "test/tools", "test/integration"]

[[bin]]
name = "reproduce"
source = ["test/integration/reproduce.c"]
include = ["include", "source", "test/tools", "test/integration"]

