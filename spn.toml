[package]
namespace = "spader"
name = "spn"
version = "0.2.0"
repo = "tspader/spn"

[deps.package]
"spader/spcc" = "1.0.0"
"spader/sp" = "1.8.1"
toml = "1.2.1"

[deps.test]
utest = "1.0.0"

[profile.default]
linkage = "static"
standard = "c99"
mode = "debug"

[profile.shared]
linkage = "shared"

[[bin]]
name = "spn"
source = ["source/**/*.c"]
include = ["include", "source", "source/external"]

[[test]]
name = "om"
source = ["test/core/ordered_map.c"]
include = ["include", "source"]

[[test]]
name = "intern"
source = [
  "source/intern.c",
  "source/ctx/ctx.c",
  "source/event/event.c",
  "test/core/intern.c"
]
include = ["include", "source"]

[[test]]
name = "cli"
source = ["source/sp/cli.c", "test/core/cli.c", "test/tools/tmp.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "graph"
source = ["source/graph/graph.c", "source/sp/tm.c", "test/core/graph.c", "test/tools/tmp.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "index"
source = [
  "source/enum/enum.c",
  "source/external/cJSON.c",
  "source/external/mz.c",
  "source/external/git.c",
  "source/index/index.c",
  "source/index/json.c",
  "source/sp/io.c",
  "source/sp/str.c",
  "source/semver/compare.c",
  "source/semver/convert.c",
  "source/semver/parser.c",
  "test/core/index/main.c",
  "test/core/index/query.c",
  "test/core/index/publish.c",
  "test/core/index/sync.c",
  "test/tools/harness.c",
  "test/tools/tmp.c",
  "test/tools/git.c",
  "test/tools/toml.c",
]
include = ["include", "source", "test/tools"]

[[test]]
name = "load"
source = [
  "source/ctx/ctx.c",
  "source/intern.c",
  "source/enum/enum.c",
  "source/event/event.c",
  "source/external/tom.c",
  "source/pkg/id.c",
  "source/pkg/load.c",
  "source/pkg/mutate.c",
  "source/semver/compare.c",
  "source/semver/convert.c",
  "source/semver/parser.c",
  "source/target/mutate.c",
  "source/toolchain/toolchain.c",
  "test/core/manifest.c",
  "test/tools/harness.c",
  "test/tools/tmp.c",
  "test/tools/toml.c",
]
include = ["include", "source", "test/tools"]

[[test]]
name = "resolver"
source = [
  "source/ctx/ctx.c",
  "source/intern.c",
  "source/enum/enum.c",
  "source/event/event.c",
  "source/external/cJSON.c",
  "source/external/mz.c",
  "source/external/git.c",
  "source/external/tom.c",
  "source/index/index.c",
  "source/index/json.c",
  "source/sp/io.c",
  "source/pkg/id.c",
  "source/pkg/load.c",
  "source/pkg/mutate.c",
  "source/profile/profile.c",
  "source/resolve/resolve.c",
  "source/sp/str.c",
  "source/semver/compare.c",
  "source/semver/convert.c",
