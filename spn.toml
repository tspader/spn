[package]
namespace = "spader"
name = "spn"
version = "0.2.0"
repo = "tspader/spn"

[deps.package]
"spader/spcc" = "1.0.0"
"spader/sp" = "1.9.0"
toml = "1.3.0"

[deps.test]
utest = "1.0.0"

[profile.default]
linkage = "static"
standard = "c11"
mode = "debug"

[profile.musl]
toolchain = "musl-gcc"

[[toolchain]]
package = "musl-gcc"
version = "1.0.0"

[[toolchain]]
package = "zig"
version = "0.15.2"

[[toolchain]]
name = "system"
compiler = "gcc"
linker = "ld"
archiver = "ar"
driver = "gcc"
export = true
host = [
  { arch = "x86_64", os = "linux", abi = "gnu" },
  { arch = "x86_64", os = "linux", abi = "musl" }
]
target = [
  { arch = "x86_64", os = "linux", abi = "gnu" }
]

[[toolchain]]
name = "mingw"
compiler = "x86_64-w64-mingw32-gcc"
linker = "x86_64-w64-mingw32-ld"
archiver = "x86_64-w64-mingw32-ar"
driver = "gcc"
export = true
host = [
  { arch = "x86_64", os = "linux", abi = "gnu" },
  { arch = "x86_64", os = "linux", abi = "musl" }
]
target = [
  { arch = "x86_64", os = "windows", abi = "mingw" }
]

[[bin]]
name = "spn"
source = ["source/**/*.c"]
include = ["include", "source", "source/external"]
flags = ["-include", "sp/compat.h"]

[[test]]
name = "om"
source = ["test/core/ordered_map.c"]
include = ["include", "source"]
flags = ["-include", "sp/compat.h"]

[[test]]
name = "intern"
source = [
  "source/intern/intern.c",
  "source/ctx/ctx.c",
  "source/event/event.c",
  "test/core/intern.c"
]
include = ["include", "source"]
flags = ["-include", "sp/compat.h"]

[[test]]
name = "cli"
source = ["source/sp/cli.c", "test/core/cli.c", "test/tools/tmp.c"]
include = ["include", "source", "test/tools"]
flags = ["-include", "sp/compat.h"]

[[test]]
name = "graph"
source = ["test/core/graph.c"]
include = ["test/sp_test", "include", "source", "test/core"]
flags = ["-include", "sp/compat.h", "-DSP_IMPLEMENTATION", "-DSP_TEST_IMPLEMENTATION", "-DSP_GRAPH_IMPLEMENTATION"]

