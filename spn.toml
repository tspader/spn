[package]
namespace = "spader"
name = "spn"
version = "0.2.0"
repo = "tspader/spn"

[deps.package]
"spader/spcc" = "1.0.0"
"spader/sp" = "1.6.8"
toml = "1.2.1"

[deps.test]
utest = "1.0.0"

[[profile]]
name = "debug"
mode = "debug"
cc = "clang"

[[profile]]
name = "release"
mode = "release"
cc = "clang"

[[profile]]
name = "fast"
mode = "debug"
cc = "tcc"

[[profile]]
name = "static"
mode = "debug"
cc = "musl-gcc"
libc = "musl"
linkage = "static"

[[profile]]
name = "macos"
cc = "clang"
linkage = "shared"
libc = "gnu"
standard = "c99"
mode = "debug"

[[bin]]
name = "spn"
source = [
  "source/spn.c",
  "source/api.c",
  "source/app/app.c",
  "source/event/event.c",
  "source/event/log.c",
  "source/unit/build.c",
  "source/unit/node.c",
  "source/unit/package.c",
  "source/signal.c",
  "source/graph/graph.c",
  "source/tui/tui.c",
  "source/tui/table.c",
  "source/tui/spinner.c",
  "source/ctx/ctx.c",
  "source/session/session.c",
  "source/intern.c",
  "source/log.c",
  "source/enum/enum.c",
  "source/index/index.c",
  "source/index/cache.c",
  "source/index/json.c",
  "source/index/publish.c",
  "source/pkg/load.c",
  "source/pkg/mutate.c",
  "source/pkg/pkg.c",
  "source/pkg/id.c",
  "source/lock/lock.c",
  "source/profile/profile.c",
  "source/cli/cli.c",
  "source/cli/init.c",
  "source/cli/add.c",
  "source/cli/build.c",
  "source/cli/run.c",
  "source/cli/test.c",
  "source/cli/clean.c",
  "source/cli/copy.c",
  "source/cli/generate.c",
  "source/cli/graph.c",
  "source/cli/list.c",
  "source/cli/ls.c",
  "source/cli/manifest.c",
  "source/cli/which.c",
  "source/cli/update.c",
  "source/cli/tool.c",
  "source/cli/publish.c",
  "source/gen.c",
  "source/filter/filter.c",
  "source/resolve/resolve.c",
  "source/semver/compare.c",
  "source/semver/convert.c",
  "source/semver/parser.c",
  "source/sp/terminal.c",
  "source/external/autoconf.c",
  "source/external/cc.c",
  "source/external/cJSON.c",
  "source/external/cmake.c",
  "source/external/git.c",
  "source/external/make.c",
  "source/git/cache.c",
  "source/git/key.c",
  "source/external/mz.c",
  "source/external/tcc.c",
  "source/external/tom.c",
  "source/sp/cli.c",
  "source/sp/it.c",
  "source/sp/tm.c",
  "source/sp/str.c",
  "source/sp/color.c",
  "source/sp/os.c",
  "source/sp/ps.c",
  "source/sp/io.c",
  "source/target/target.c",
  "source/target/mutate.c",
  "source/task/build.c",
  "source/task/configure.c",
  "source/task/graph.c",
  "source/task/generate.c",
  "source/task/resolve.c",
  "source/task/sync.c",
  "source/task/task.c",
  "source/task/test.c",
  "source/task/which.c",
]
include = ["include", "source", "source/external"]

[[test]]
name = "om"
source = ["test/core/ordered_map.c"]
include = ["include", "source"]

[[test]]
name = "intern"
source = [
  "source/intern.c",
  "source/ctx/ctx.c",
  "source/event/event.c",
  "test/core/intern.c"
]
include = ["include", "source"]

[[test]]
name = "cli"
source = ["source/sp/cli.c", "test/core/cli.c", "test/tools/tmp.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "graph"
source = ["source/graph/graph.c", "source/sp/tm.c", "test/core/graph.c", "test/tools/tmp.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "index"
source = [
  "source/enum/enum.c",
  "source/external/cJSON.c",
  "source/external/mz.c",
  "source/external/git.c",
  "source/index/index.c",
  "source/index/json.c",
  "source/sp/io.c",
  "source/sp/str.c",
  "source/semver/compare.c",
  "source/semver/convert.c",
  "source/semver/parser.c",
  "test/core/index/main.c",
  "test/core/index/query.c",
  "test/core/index/publish.c",
  "test/core/index/sync.c",
  "test/tools/harness.c",
  "test/tools/tmp.c",
  "test/tools/git.c",
  "test/tools/toml.c",
]
include = ["include", "source", "test/tools"]

[[test]]
name = "resolver"
source = [
  "source/ctx/ctx.c",
  "source/intern.c",
  "source/enum/enum.c",
  "source/event/event.c",
  "source/external/cJSON.c",
  "source/external/mz.c",
  "source/external/git.c",
  "source/external/tom.c",
  "source/index/index.c",
  "source/index/json.c",
  "source/sp/io.c",
  "source/pkg/id.c",
  "source/pkg/load.c",
  "source/pkg/mutate.c",
  "source/profile/profile.c",
  "source/resolve/resolve.c",
  "source/sp/str.c",
  "source/semver/compare.c",
  "source/semver/convert.c",
  "source/semver/parser.c",
  "source/target/mutate.c",
  "test/core/resolver/main.c",
  "test/tools/harness.c",
  "test/tools/tmp.c",
  "test/tools/git.c",
  "test/tools/toml.c",
]
include = ["include", "source", "test/tools"]

[[test]]
name = "publish"
source = [
  "source/cli/publish.c",
  "source/ctx/ctx.c",
  "source/enum/enum.c",
  "source/event/event.c",
  "source/external/cJSON.c",
  "source/external/git.c",
  "source/external/mz.c",
  "source/external/tom.c",
  "source/index/index.c",
  "source/index/json.c",
  "source/intern.c",
  "source/pkg/id.c",
  "source/pkg/load.c",
  "source/pkg/mutate.c",
  "source/profile/profile.c",
  "source/semver/compare.c",
  "source/semver/convert.c",
  "source/semver/parser.c",
  "source/sp/io.c",
  "source/sp/str.c",
  "source/target/mutate.c",
  "test/core/publish/main.c",
  "test/core/publish/publish.c",
  "test/tools/harness.c",
  "test/tools/tmp.c",
  "test/tools/git.c",
  "test/tools/toml.c",
]
include = ["include", "source", "test/tools"]

[[test]]
name = "lock"
source = [
  "source/lock/lock.c",
  "source/external/tom.c",
  "source/enum/enum.c",
  "source/semver/convert.c",
  "source/semver/parser.c",
  "source/sp/str.c",
  "test/core/lock/main.c",
  "test/tools/harness.c",
  "test/tools/tmp.c",
  "test/tools/git.c",
  "test/tools/toml.c",
]
include = ["include", "source", "test/tools"]

[[test]]
name = "git"
source = [
  "source/git/cache.c",
  "source/git/key.c",
  "source/external/git.c",
  "test/core/git/main.c",
  "test/core/git/fixture.c",
  "test/core/git/cache.c",
  "test/core/git/key.c",
  "test/tools/harness.c",
  "test/tools/tmp.c",
  "test/tools/git.c",
  "test/tools/toml.c",
]
include = ["include", "source", "test/tools"]

[[test]]
name = "integration"
source = [
  "source/external/tom.c",
  "test/integration/main.c",
  "test/integration/harness.c",
  "test/tools/tmp.c",
  "test/tools/git.c",
  "test/tools/toml.c",
]
include = ["include", "source", "source/external", "test/integration", "test/tools"]
