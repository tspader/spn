[package]
name = "spn"
version = "0.1.0"
repo = "tspader/spn"

[deps.package]
spcc = "1.0.0"
sp = "1.6.6"
toml = "1.2.1"

[deps.test]
utest = "1.0.0"

[[profile]]
name = "debug"
mode = "debug"
cc = "clang"

[[profile]]
name = "release"
mode = "release"
cc = "clang"

[[profile]]
name = "fast"
mode = "debug"
cc = "tcc"

[[profile]]
name = "static"
mode = "debug"
cc = "musl-gcc"
libc = "musl"
linkage = "static"

[[profile]]
name = "macos"
cc = "clang"
linkage = "shared"
libc = "gnu"
standard = "c99"
mode = "debug"

[[bin]]
name = "spn"
source = [
  "source/spn.c",
  "source/api.c",
  "source/app.c",
  "source/event.c",
  "source/unit.c",
  "source/signal.c",
  "source/graph.c",
  "source/tui.c",
  "source/ctx.c",
  "source/session.c",
  "source/intern.c",
  "source/log.c",
  "source/option.c",
  "source/index.c",
  "source/pkg.c",
  "source/lock.c",
  "source/profile.c",
  "source/cli.c",
  "source/gen.c",
  "source/target.c",
  "source/filter.c",
  "source/resolve.c",
  "source/semver.c",
  "source/spinner.c",
  "source/terminal.c",
  "source/external/autoconf.c",
  "source/external/cc.c",
  "source/external/cJSON.c",
  "source/external/cmake.c",
  "source/external/git.c",
  "source/external/make.c",
  "source/external/mz.c",
  "source/external/tcc.c",
  "source/external/tom.c",
  "source/sp/cli.c",
  "source/sp/it.c",
  "source/sp/tm.c",
  "source/sp/str.c",
  "source/sp/color.c",
  "source/sp/os.c",
  "source/sp/ps.c",
  "source/sp/io.c",
  "source/task/build.c",
  "source/task/configure.c",
  "source/task/graph.c",
  "source/task/generate.c",
  "source/task/resolve.c",
  "source/task/sync.c",
  "source/task/task.c",
  "source/task/test.c",
  "source/task/which.c",
]
include = ["include", "source", "source/external"]

[[test]]
name = "cli"
source = ["test/core/cli.c", "test/tools/test.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "graph"
source = ["source/graph.c", "test/core/graph.c", "test/tools/test.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "om"
source = ["test/core/ordered_map.c"]
include = ["include", "source", "test/tools"]

[[test]]
name = "integration"
source = ["test/integration/main.c", "test/tools/test.c", "test/tools/harness.c", "test/tools/toml.c", "source/external/tom.c"]
include = ["include", "source", "test/tools", "test/integration"]
