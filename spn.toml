[package]
namespace = "spader"
name = "spn"
version = "0.2.0"
repo = "tspader/spn"
include = ["include", "source/codegen/gen"]

[package.configure]
source = ["tools/spn/configure.c"]
include = ["include", "source/codegen/gen"]

[package.build]
source = ["tools/spn/build.c"]
include = ["include", "source/codegen/gen"]

[deps.package]
"spader/sp" = "3.0.0"
"spader/wamr" = "file://./vendor/wamr/spn.toml"
toml = "1.4.0"
yyjson = "0.13.0"

[deps.test]
utest = "1.0.0"

[profile.default]
linkage = "static"
standard = "c11"
mode = "debug"

[profile.musl]
toolchain = "zig"
abi = "musl"

[[toolchain]]
name = "mingw"
compiler = "x86_64-w64-mingw32-gcc"
linker = "x86_64-w64-mingw32-ld"
archiver = "x86_64-w64-mingw32-ar"
driver = "gcc"
target = [
  { arch = "x86_64", os = "windows", abi = "mingw" }
]

[[bin]]
name = "spn"
source = ["source/**/*.c"]
include = ["include", "source", "source/external", "source/codegen/gen"]
flags = []

[[test]]
name = "stable_map"
source = ["test/core/stable_map.c"]
include = ["include", "source"]
flags = []

[[test]]
name = "intern"
source = [
  "source/intern/intern.c",
  "source/ctx/ctx.c",
  "source/event/event.c",
  "test/core/intern.c"
]
include = ["include", "source"]
flags = []

[[test]]
name = "graph"
source = ["test/core/graph/main.c"]
include = ["include", "source", "test/tools"]
flags = ["-DSP_IMPLEMENTATION", "-DSP_TEST_IMPLEMENTATION", "-DSP_GRAPH_IMPLEMENTATION"]

[[test]]
name = "index"
