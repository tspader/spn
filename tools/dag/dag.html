<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dag</title>
<link rel="stylesheet" href="./base.css">
<link rel="stylesheet" href="./dag.css">
</head>
<body>

<header class="topbar">
  <h1 class="brand">dag</h1>
  <div class="topbar-meta mono" id="meta"></div>
  <div class="topbar-status" id="status"></div>
  <label class="btn">
    open journal.jsonl
    <input type="file" id="file" accept=".jsonl,.json" hidden>
  </label>
</header>

<main class="shell" id="shell" hidden>
  <section class="timeline" aria-label="event timeline">
    <div class="timeline-controls">
      <button class="btn btn-icon" id="prev" title="previous event (←)">‹</button>
      <input type="range" id="scrub" min="-1" value="-1">
      <button class="btn btn-icon" id="next" title="next event (→)">›</button>
      <span class="mono muted" id="pos"></span>
    </div>
    <ol class="event-list" id="events"></ol>
  </section>

  <section class="stage" aria-label="graph">
    <svg id="graph"></svg>
    <div class="legend mono">
      <span><i class="swatch swatch-exec"></i>executed</span>
      <span><i class="swatch swatch-hit"></i>cache hit</span>
      <span><i class="swatch swatch-dirty"></i>dirty</span>
      <span><i class="swatch swatch-bad"></i>diverged</span>
    </div>
  </section>

  <aside class="details" id="details" aria-label="details"></aside>
</main>

<section class="empty" id="empty">
  <p>drop a <span class="mono">journal.jsonl</span> here, or use the button above</p>
  <p class="muted">produce one with <span class="mono">fuzz_dag --render DIR --iter N --seed 0x…</span> — it lands in <span class="mono">DIR/N/journal.jsonl</span></p>
  <p class="muted">arrow keys step events; shift-arrows step trace steps; click nodes for details</p>
</section>

<script src="./dag.js"></script>
</body>
</html>
